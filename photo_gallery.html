<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <h1 class="text-3xl font-bold text-center mb-8">Travel Photo Gallery of NEPAL</h1>
    <div class="flex flex-col items-center justify-center text-center my-4">
    <p>여행은 다른 풍경을 보는 것이 아니라, 새로운 눈을 갖게 되는 과정이다.</p>
    <p>멈춤이 있어야 비로소 보이는 것들, 여행은 삶의 쉼표이자 다시 시작할 느낌 표이다.</p>
    </div>

<!--큰 이미지-->
<div class="grid gap-4">
    <div class="main-display">
        <img id="topImage" class="w-full h-auto max-w-full object-cover object-center md:h-[480px]" src="images/lumbini-of-nepal.png" alt="">
    </div>
    <!--작은 이미지-->
<div class="thumbnail-list grid grid-cols-5 gap-3">
    <img class="hover:scale-105 thumb w-full h-40 rounded-lg object-cover cursor-pointer opacity-60  transition-opacity" src="images/chitwan rhino.jpg" alt="">
    <img class="hover:scale-105 thumb w-full h-40 rounded-lg object-cover cursor-pointer opacity-60  transition-opacity" src="images/mahadev.jfif" alt="">
    <img class="hover:scale-105 thumb w-full h-40 rounded-lg object-cover cursor-pointer opacity-60  transition-opacity" src="images/everest image.jpg" alt="">
    <img class="hover:scale-105 thumb w-full h-40 rounded-lg object-cover cursor-pointer opacity-60  transition-opacity" src="images/pashupatinath temple.jpg" alt="">
    <img class="hover:scale-105 thumb w-full h-40 rounded-lg object-cover cursor-pointer opacity-60  transition-opacity" src="images/shanti stupa pokhara.jpg" alt="">
</div>
<!--스크립트-->
<script>
// 상위 큰 이미지 요소 선택
const topImage = document.getElementById("topImage");
// 하위 이미지들이 담긴 부모 요소 선택
const thumbList = document.querySelector(".thumbnail-list");
// 클릭 이벤트 리스너 추가 (이벤트 위임 활용)
thumbList.addEventListener("click", function (event) {
// 클릭된 요소가 'thumb' 클래스를 가진 이미지인지 확인
if (event.target.classList.contains("thumb")) {
// 클릭한 하위 이미지의 src를 상위 이미지의 src로 변경
topImage.src = event.target.src;
}
});
</script>
</div>
</body>
</html>
